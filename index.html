<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ordini — Chiosco</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #0F6E56;
    --teal-mid: #1D9E75;
    --teal-light: #9FE1CB;
    --teal-pale: #E1F5EE;
    --amber: #BA7517;
    --amber-light: #FAEEDA;
    --red: #A32D2D;
    --red-light: #FCEBEB;
    --ink: #1a1a18;
    --muted: #5F5E5A;
    --border: #D3D1C7;
    --bg: #F7F5F0;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 120px;
  }

  header {
    background: var(--teal);
    color: white;
    padding: 18px 20px 14px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; letter-spacing: 0.3px; }
  header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }

  .setup-banner {
    background: var(--amber-light);
    border-bottom: 1px solid #EAC97A;
    padding: 10px 20px;
    font-size: 12px;
    color: var(--amber);
    display: flex; align-items: center; gap: 8px;
  }
  .setup-banner a { color: var(--amber); font-weight: 600; text-decoration: underline; }

  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 1.2px;
    color: var(--muted); text-transform: uppercase;
    padding: 20px 20px 8px;
  }

  .products-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 16px;
  }

  .product-card {
    background: var(--white);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 14px 12px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .product-card:active { transform: scale(0.97); }
  .product-card.selected {
    border-color: var(--teal-mid);
    background: var(--teal-pale);
  }
  .product-card .name {
    font-size: 14px; font-weight: 500; line-height: 1.3;
    margin-bottom: 6px;
  }
  .product-card .price {
    font-family: 'DM Serif Display', serif;
    font-size: 18px; color: var(--teal);
  }
  .product-card .qty-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--teal);
    color: white;
    border-radius: 50%;
    width: 24px; height: 24px;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.5);
    transition: opacity 0.15s, transform 0.15s;
  }
  .product-card.selected .qty-badge { opacity: 1; transform: scale(1); }

  .qty-controls {
    display: flex; align-items: center; gap: 0;
    margin-top: 10px;
    background: var(--teal-pale);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--teal-light);
  }
  .qty-btn {
    width: 34px; height: 30px;
    border: none; background: none;
    font-size: 18px; font-weight: 400;
    color: var(--teal);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .qty-num {
    flex: 1; text-align: center;
    font-size: 14px; font-weight: 600;
    color: var(--teal);
  }

  /* Cart */
  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 16px 24px;
    background: var(--white);
    border-top: 1px solid var(--border);
    z-index: 200;
    transition: transform 0.2s;
  }
  .cart-bar.hidden { transform: translateY(110%); }

  .cart-summary {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
    font-size: 13px; color: var(--muted);
  }
  .cart-summary strong { color: var(--ink); font-size: 16px; }
  .cart-total {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--teal);
    margin-left: auto;
  }

  .cart-items {
    margin-bottom: 10px;
    max-height: 120px; overflow-y: auto;
  }
  .cart-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0;
    font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item .item-name { flex: 1; }
  .cart-item .item-price { color: var(--teal); font-weight: 500; margin-left: 8px; }
  .cart-item .item-remove {
    background: none; border: none; color: var(--muted);
    font-size: 16px; cursor: pointer; padding: 0 4px; margin-left: 4px;
  }

  .btn-order {
    width: 100%;
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn-order:active { transform: scale(0.98); background: var(--teal-mid); }
  .btn-order:disabled { background: var(--border); color: var(--muted); cursor: default; }

  /* Toast */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--ink); color: white;
    padding: 10px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    z-index: 999; white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--teal); }
  .toast.error { background: var(--red); }

  .sync-btn {
    width: 100%; background: none; color: var(--teal);
    border: 1.5px solid var(--teal-light);
    border-radius: 12px; padding: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; margin-bottom: 10px;
    transition: background 0.15s;
  }
  .sync-btn:hover { background: var(--teal-pale); }
  .sync-btn:disabled { opacity: 0.5; cursor: default; }
  .prod-preview {
    background: var(--bg); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 14px;
    font-size: 12px; color: var(--muted);
    max-height: 140px; overflow-y: auto;
    border: 1px solid var(--border);
  }
  .prod-preview .prod-row { padding: 3px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .prod-preview .prod-row:last-child { border-bottom: none; }

  /* Config modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 500;
    display: flex; align-items: flex-end;
  }
  .overlay.hidden { display: none; }
  .modal {
    background: var(--white);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px 36px;
    width: 100%;
  }
  .modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }
  .modal label { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
  .modal input {
    width: 100%; padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: 14px;
    background: var(--bg);
  }
  .modal input:focus { outline: none; border-color: var(--teal-mid); }
  .btn-save {
    width: 100%; background: var(--teal); color: white;
    border: none; border-radius: 12px; padding: 14px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer;
  }

  .config-btn {
    float: right; margin-top: 2px;
    background: rgba(255,255,255,0.15);
    border: none; color: white;
    border-radius: 8px; padding: 4px 10px;
    font-size: 12px; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--muted); font-size: 14px;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block; margin-right: 6px;
    background: var(--border);
  }
  .status-dot.ok { background: var(--teal-mid); }
</style>
</head>
<body>

<header>
  <button class="config-btn" onclick="openConfig()">⚙ Configura</button>
  <h1>Chiosco</h1>
  <p id="conn-status"><span class="status-dot" id="dot"></span><span id="conn-text">Non configurato</span></p>
</header>

<div class="setup-banner" id="setup-banner">
  ⚠ Configura il link di Google Sheets per inviare gli ordini →
  <a href="#" onclick="openConfig(); return false;">Configura ora</a>
</div>

<div class="section-label">Prodotti</div>
<div class="products-grid" id="products-grid"></div>

<!-- Cart bar -->
<div class="cart-bar hidden" id="cart-bar">
  <div class="cart-summary">
    <strong id="cart-count">0 articoli</strong>
    <span class="cart-total" id="cart-total">€ 0,00</span>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <button class="btn-order" id="btn-order" onclick="sendOrder()">Invia ordine →</button>
</div>

<div class="toast" id="toast"></div>

<!-- Config modal -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2>Configurazione</h2>
    <p>Incolla il link del tuo Google Apps Script. I prodotti vengono caricati automaticamente dal foglio Prodotti in Google Sheets.</p>
    <label>URL Google Apps Script</label>
    <input type="url" id="script-url" placeholder="https://script.google.com/macros/s/.../exec" />
    <button class="sync-btn" id="sync-btn" onclick="syncProducts()">↻ Sincronizza prodotti da Sheets</button>
    <div class="prod-preview" id="prod-preview"></div>
    <button class="btn-save" onclick="saveConfig()">Salva</button>
    <button style="width:100%;margin-top:8px;background:none;border:none;color:var(--muted);font-size:14px;padding:10px;cursor:pointer;" onclick="closeConfig()">Annulla</button>
  </div>
</div>

<script>
const DEFAULT_PRODUCTS = [
  { name: "Acqua 0.5L",       price: 1.50 },
  { name: "Coca-Cola 0.33L",  price: 2.50 },
  { name: "Caffè espresso",   price: 1.20 },
  { name: "Cornetto",         price: 1.50 },
  { name: "Succo di frutta",  price: 2.00 },
  { name: "Birra 0.33L",      price: 3.00 },
  { name: "Tramezzino",       price: 3.50 },
];

let cart = {};
let products = [];
let scriptUrl = '';

function loadConfig() {
  scriptUrl = localStorage.getItem('chiosco_url') || '';
  const saved = localStorage.getItem('chiosco_products');
  if (saved) {
    try { products = JSON.parse(saved); } catch { products = DEFAULT_PRODUCTS; }
  } else { products = DEFAULT_PRODUCTS; }
  updateStatus();
  renderProducts();
  // Auto-sync se c'è già un URL configurato
  if (scriptUrl) syncProductsSilent();
}

function updateStatus() {
  const dot = document.getElementById('dot');
  const txt = document.getElementById('conn-text');
  const banner = document.getElementById('setup-banner');
  if (scriptUrl) {
    dot.className = 'status-dot ok';
    txt.textContent = 'Connesso a Google Sheets';
    banner.style.display = 'none';
  } else {
    dot.className = 'status-dot';
    txt.textContent = 'Non configurato';
    banner.style.display = '';
  }
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  if (!products.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:span 2">Nessun prodotto configurato.<br>Premi ⚙ Configura per aggiungerne.</div>';
    return;
  }
  grid.innerHTML = products.map((p, i) => `
    <div class="product-card" id="card-${i}" onclick="toggleProduct(${i})">
      <span class="qty-badge" id="badge-${i}">1</span>
      <div class="name">${p.name}</div>
      <div class="price">€ ${p.price.toFixed(2).replace('.',',')}</div>
      <div class="qty-controls" id="qc-${i}" style="display:none" onclick="event.stopPropagation()">
        <button class="qty-btn" onclick="changeQty(${i},-1)">−</button>
        <span class="qty-num" id="qnum-${i}">1</span>
        <button class="qty-btn" onclick="changeQty(${i},+1)">+</button>
      </div>
    </div>
  `).join('');
}

function toggleProduct(i) {
  if (cart[i]) {
    delete cart[i];
    document.getElementById('card-'+i).classList.remove('selected');
    document.getElementById('qc-'+i).style.display = 'none';
  } else {
    cart[i] = 1;
    document.getElementById('card-'+i).classList.add('selected');
    document.getElementById('badge-'+i).textContent = 1;
    document.getElementById('qnum-'+i).textContent = 1;
    document.getElementById('qc-'+i).style.display = 'flex';
  }
  updateCart();
}

function changeQty(i, delta) {
  if (!cart[i]) return;
  cart[i] = Math.max(1, cart[i] + delta);
  document.getElementById('badge-'+i).textContent = cart[i];
  document.getElementById('qnum-'+i).textContent = cart[i];
  updateCart();
}

function updateCart() {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  const total = keys.reduce((s, k) => s + products[k].price * cart[k], 0);
  const count = keys.reduce((s, k) => s + cart[k], 0);

  const bar = document.getElementById('cart-bar');
  if (keys.length === 0) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');

  document.getElementById('cart-count').textContent = count + (count === 1 ? ' articolo' : ' articoli');
  document.getElementById('cart-total').textContent = '€ ' + total.toFixed(2).replace('.',',');

  document.getElementById('cart-items').innerHTML = keys.map(k => `
    <div class="cart-item">
      <span class="item-name">${cart[k]}× ${products[k].name}</span>
      <span class="item-price">€ ${(products[k].price * cart[k]).toFixed(2).replace('.',',')}</span>
      <button class="item-remove" onclick="toggleProduct(${k})">×</button>
    </div>
  `).join('');
}

async function sendOrder() {
  const keys = Object.keys(cart).filter(k => cart[k] > 0);
  if (!keys.length) return;

  const btn = document.getElementById('btn-order');
  btn.disabled = true;
  btn.textContent = 'Invio in corso…';

  const items = keys.map(k => ({
    prodotto: products[k].name,
    quantita: cart[k],
    prezzo: products[k].price,
    totale: +(products[k].price * cart[k]).toFixed(2)
  }));

  const payload = {
    tipo: 'VENDITA',
    data: new Date().toLocaleDateString('it-IT'),
    items,
    totale: items.reduce((s, x) => s + x.totale, 0).toFixed(2)
  };

  if (!scriptUrl) {
    showToast('Configura prima il link di Google Sheets!', 'error');
    btn.disabled = false; btn.textContent = 'Invia ordine →'; return;
  }

  try {
    await fetch(scriptUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    showToast('Ordine inviato! ✓', 'success');
    clearCart();
  } catch (e) {
    showToast('Errore di connessione', 'error');
  }
  btn.disabled = false; btn.textContent = 'Invia ordine →';
}

function clearCart() {
  Object.keys(cart).forEach(k => {
    document.getElementById('card-'+k)?.classList.remove('selected');
    document.getElementById('qc-'+k).style.display = 'none';
  });
  cart = {};
  updateCart();
}

async function fetchScript(url) {
  const proxy = 'https://corsproxy.io/?' + encodeURIComponent(url);
  const res = await fetch(proxy);
  return await res.json();
}

async function syncProducts() {
  const urlInput = document.getElementById('script-url').value.trim();
  const url = urlInput || scriptUrl;
  if (!url) { showToast("Inserisci prima l'URL", 'error'); return; }

  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = '↻ Caricamento…';

  try {
    const data = await fetchScript(url);
    if (data.status === 'ok' && data.products && data.products.length) {
      const preview = document.getElementById('prod-preview');
      preview.innerHTML = data.products.map(p =>
        `<div class="prod-row"><span>${p.name}</span><span>€ ${Number(p.price).toFixed(2).replace('.',',')}</span></div>`
      ).join('');
      preview.style.display = 'block';
      btn._syncedProducts = data.products;
      showToast(data.products.length + ' prodotti trovati ✓', 'success');
    } else {
      showToast('Nessun prodotto trovato', 'error');
    }
  } catch(e) {
    showToast("Errore: controlla l'URL", 'error');
  }
  btn.disabled = false; btn.textContent = '↻ Sincronizza prodotti da Sheets';
}

async function syncProductsSilent() {
  if (!scriptUrl) return;
  try {
    const data = await fetchScript(scriptUrl);
    if (data.status === 'ok' && data.products && data.products.length) {
      products = data.products;
      localStorage.setItem('chiosco_products', JSON.stringify(products));
      renderProducts();
    }
  } catch(e) { /* silenzioso */ }
}
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2500);
}

function openConfig() {
  document.getElementById('script-url').value = scriptUrl;
  document.getElementById('prod-preview').style.display = 'none';
  const btn = document.getElementById('sync-btn');
  btn._syncedProducts = null;
  document.getElementById('overlay').classList.remove('hidden');
}
function closeConfig() { document.getElementById('overlay').classList.add('hidden'); }
function saveConfig() {
  const url = document.getElementById('script-url').value.trim();
  const btn = document.getElementById('sync-btn');

  if (url) localStorage.setItem('chiosco_url', url);
  else localStorage.removeItem('chiosco_url');

  // Se ha sincronizzato, salva i prodotti freschi da Sheets
  if (btn._syncedProducts && btn._syncedProducts.length) {
    products = btn._syncedProducts;
    localStorage.setItem('chiosco_products', JSON.stringify(products));
  }

  scriptUrl = url;
  cart = {};
  closeConfig();
  updateStatus();
  renderProducts();
  updateCart();
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeConfig();
});

loadConfig();
</script>
</body>
</html>
